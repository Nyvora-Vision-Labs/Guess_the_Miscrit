<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Who's That Miscrit?!</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-dark: #161224;
        --poke-yellow: #ffcb05;
        --poke-blue: #2a75bb;
        --poke-dark-blue: #1d2c5e;
        --burst-blue: #5fc3fa;
        --red-outer: #cc2229;
        --red-dark: #8b1317;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg-dark);
        color: white;
        font-family: "Nunito", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 16px;
      }

      /* Pokemon Style Text */
      .title-text {
        font-family: "Bangers", cursive;
        font-size: 2.8rem;
        color: var(--poke-yellow);
        text-align: center;
        letter-spacing: 2px;
        text-shadow: -3px -3px 0 var(--poke-blue), 3px -3px 0 var(--poke-blue),
          -3px 3px 0 var(--poke-blue), 3px 3px 0 var(--poke-blue),
          0px 6px 0 var(--poke-dark-blue);
        line-height: 1.1;
        margin-bottom: 10px;
        position: relative;
        z-index: 2;
      }

      .scoreboard {
        display: flex;
        gap: 15px;
        margin-bottom: 15px;
        font-family: "Bangers", cursive;
        font-size: 1.5rem;
        color: var(--poke-yellow);
        letter-spacing: 1px;
      }

      /* Main Game Card Container */
      .game-card {
        position: relative;
        background: var(--red-outer);
        border: 6px solid var(--red-dark);
        border-radius: 24px;
        padding: 20px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6),
          inset 0 0 20px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      /* The Anime Sunburst Effect */
      .burst-rays {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 150%;
        height: 150%;
        transform: translate(-50%, -50%);
        background: repeating-conic-gradient(
          from 0deg,
          #ffffff 0deg 3deg,
          var(--burst-blue) 3deg 6deg
        );
        mask-image: radial-gradient(
          circle,
          rgba(0, 0, 0, 1) 15%,
          rgba(0, 0, 0, 0) 65%
        );
        -webkit-mask-image: radial-gradient(
          circle,
          rgba(0, 0, 0, 1) 15%,
          rgba(0, 0, 0, 0) 65%
        );
        z-index: 0;
        pointer-events: none;
      }

      /* Floating Question Mark */
      .question-mark {
        position: absolute;
        right: 20px;
        top: 80px;
        font-family: "Bangers", cursive;
        font-size: 6rem;
        color: var(--poke-yellow);
        text-shadow: -4px -4px 0 var(--poke-blue), 4px -4px 0 var(--poke-blue),
          -4px 4px 0 var(--poke-blue), 4px 4px 0 var(--poke-blue),
          6px 6px 0 var(--poke-dark-blue);
        transform: rotate(15deg);
        z-index: 2;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(15deg);
        }
        50% {
          transform: translateY(-15px) rotate(10deg);
        }
      }

      /* Image Styling */
      .image-wrap {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 240px;
        margin-bottom: 10px;
        z-index: 2;
      }

      .miscrit-img {
        max-height: 220px;
        max-width: 100%;
        filter: brightness(0) drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.8)); /* Pure black with glowing edge */
        transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .miscrit-img.revealed {
        filter: brightness(1) drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.5));
      }

      /* Feedback Pill */
      .feedback-wrapper {
        display: flex;
        justify-content: center;
        position: relative;
        z-index: 2;
        min-height: 40px;
      }
      .feedback {
        background: white;
        border-radius: 999px;
        padding: 6px 20px;
        font-weight: 800;
        font-size: 1.1rem;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }
      .feedback.correct {
        color: #28a745;
        border: 2px solid #28a745;
      }
      .feedback.wrong {
        color: #dc3545;
        border: 2px solid #dc3545;
      }

      /* UI Controls */
      .ui-container {
        position: relative;
        z-index: 2;
        margin-top: 20px;
      }

      .input-row {
        display: flex;
        gap: 10px;
      }
      .guess-input {
        flex: 1;
        background: var(--bg-dark);
        border: 2px solid #000;
        border-radius: 12px;
        color: white;
        padding: 15px;
        outline: none;
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 1rem;
        box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.5);
      }

      .btn-go {
        background: var(--poke-yellow);
        color: black;
        border: 2px solid #000;
        border-radius: 12px;
        font-family: "Bangers", cursive;
        font-size: 1.6rem;
        padding: 0 25px;
        cursor: pointer;
        transition: transform 0.1s;
        box-shadow: 0 4px 0 #b38f00;
      }
      .btn-go:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #b38f00;
      }

      .btn-next {
        background: #ed6c6c;
        color: white;
        border: 2px solid #a83232;
        border-radius: 12px;
        font-family: "Bangers", cursive;
        font-size: 1.6rem;
        padding: 12px;
        width: 100%;
        cursor: pointer;
        margin-top: 15px;
        box-shadow: 0 4px 0 #a83232;
        letter-spacing: 1px;
      }
      .btn-next:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #a83232;
      }

      /* Easy Mode Options */
      .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .option-btn {
        background: var(--bg-dark);
        border: 2px solid #000;
        border-radius: 12px;
        color: white;
        padding: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        font-family: "Nunito", sans-serif;
      }
      .option-btn:hover {
        background: var(--poke-dark-blue);
      }
      .option-btn.correct {
        background: #28a745 !important;
      }
      .option-btn.wrong {
        background: #dc3545 !important;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>

      <div>SCORE: <span id="scoreCorrect">0</span></div>

    </div>

            box-shadow: 0 4px 0 #b38f00;

    </div>

            type="text"
            class="guess-input"
            id="guessInput"

            autocomplete="off"
          />
          <button class="btn-go" id="btnSubmit">GO</button>
        </div>

        <button class="btn-next hidden" id="btnNext">NEXT →</button>
      </div>
    </div>

      const FOLDER = "miscrits_silhouettes";
      let gameMode = "easy";
      let currentIdx = 0;
      let score = 0;
      let queue = [];
      let answered = false;

      // Mode Selection
      document.getElementById("pickEasy").onclick = () => {
        gameMode = "easy";
        updateModeBtns();
      };
      document.getElementById("pickHard").onclick = () => {
        gameMode = "hard";
        updateModeBtns();
      };

      function updateModeBtns() {
        document.getElementById("pickEasy").style.borderColor =
          gameMode === "easy" ? "var(--poke-yellow)" : "#000";
        document.getElementById("pickHard").style.borderColor =
          gameMode === "hard" ? "var(--poke-yellow)" : "#000";
      }

      document.getElementById("btnStart").onclick = () => {
        queue = [...MISCRITS_DATA].sort(() => Math.random() - 0.5).slice(0, 50);
        currentIdx = 0;
        score = 0;
        document.getElementById("introScreen").classList.add("hidden");
        document.getElementById("gameScreen").classList.remove("hidden");
        loadRound();
      };

      function loadRound() {
        answered = false;
        const name = queue[currentIdx];

        // Ensure path loads exactly from your folder
        const imgEl = document.getElementById("miscritImg");
        imgEl.src = `${FOLDER}/${name}.png`;
        imgEl.classList.remove("revealed");
        imgEl.onerror = () => {
          imgEl.src = "https://via.placeholder.com/200?text=Missing+Image";
        };

        document.getElementById("roundNum").textContent = currentIdx + 1;
        document.getElementById("feedback").classList.add("hidden");
        document.getElementById("btnNext").classList.add("hidden");

        if (gameMode === "easy") setupEasy(name);
        else setupHard();
      }

      function setupEasy(correctName) {
        document.getElementById("easyUI").classList.remove("hidden");
        document.getElementById("hardUI").classList.add("hidden");

        let others = MISCRITS_DATA.filter((n) => n !== correctName)
          .sort(() => Math.random() - 0.5)
          .slice(0, 3);
        let choices = [correctName, ...others].sort(() => Math.random() - 0.5);

        const btns = document.querySelectorAll("#easyUI .option-btn");
        btns.forEach((btn, i) => {
          // Removes _silhouette for the button text display
          btn.textContent = choices[i].replace("_silhouette", "");
          btn.className = "option-btn";
          btn.onclick = () => checkAnswer(choices[i], btn);
        });
      }

      function setupHard() {
        document.getElementById("hardUI").classList.remove("hidden");
        document.getElementById("easyUI").classList.add("hidden");
        const input = document.getElementById("guessInput");
        input.value = "";
        input.disabled = false;
        input.focus();
        document.getElementById("btnSubmit").onclick = () =>
          checkAnswer(input.value);
      }

      function checkAnswer(guess, btn = null) {
        if (answered) return;
        answered = true;

        const correctName = queue[currentIdx];
        // Creates a clean version for display and validation
        const cleanName = correctName.replace("_silhouette", "");

        // Validates both the raw file name and the clean display name
        const isCorrect =
          guess.toLowerCase().trim() === correctName.toLowerCase() ||
          guess.toLowerCase().trim() === cleanName.toLowerCase();

        document.getElementById("miscritImg").classList.add("revealed");
        document.getElementById("btnNext").classList.remove("hidden");
        const feedback = document.getElementById("feedback");
        feedback.classList.remove("hidden");

        if (isCorrect) {
          score++;
          document.getElementById("scoreCorrect").textContent = score;
          feedback.textContent = `Correct! It's ${cleanName}!`;
          feedback.className = "feedback correct";
          if (btn) btn.classList.add("correct");
        } else {
          feedback.textContent = `Wrong! It was ${cleanName}.`;
          feedback.className = "feedback wrong";
          if (btn) btn.classList.add("wrong");
        }

        if (gameMode === "hard")
          document.getElementById("guessInput").disabled = true;
      }

      document.getElementById("btnNext").onclick = () => {
        currentIdx++;
        if (currentIdx < queue.length) {
          loadRound();
        } else {
          alert(`Game Over! You guessed ${score} out of ${queue.length}!`);
          location.reload();
        }
      };

      document
        .getElementById("guessInput")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") document.getElementById("btnSubmit").click();
        });
    </script>
  </body>
</html>
