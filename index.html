<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Who's That Miscrit?!</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<script src="miscrits_data.js"></script>
<style>
:root{--bg:#0d0b1a;--card:#1a1630;--accent:#f7c948;--accent2:#5fc3fa;--red:#c0392b;--red2:#922b21;--green:#27ae60;--purple:#6c3fc5;--purple2:#4a2896;--text:#f0eaff;--subtext:#a89fc4}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;background-image:radial-gradient(ellipse at 20% 20%,#1e0a3c 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#0a1e3c 0%,transparent 60%)}
h1.logo{font-family:'Bangers',cursive;font-size:2.6rem;color:var(--accent);letter-spacing:3px;text-align:center;text-shadow:-2px -2px 0 #b38f00,2px 2px 0 #7a5f00,0 4px 20px rgba(247,201,72,.4);line-height:1;margin-bottom:4px}
.tagline{font-size:.85rem;color:var(--subtext);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}

/* TOP BAR */
#topBar{display:none;width:100%;max-width:500px;margin-bottom:12px;justify-content:space-between;align-items:center;gap:8px}
#topBar.show{display:flex}
.stat-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:5px 14px;font-family:'Bangers',cursive;font-size:1.1rem;color:var(--accent);letter-spacing:1px}
#btnHome{background:var(--red);border:2px solid var(--red2);color:#fff;font-family:'Bangers',cursive;font-size:1.1rem;padding:5px 14px;border-radius:999px;cursor:pointer;letter-spacing:1px;transition:filter .15s}
#btnHome:hover{filter:brightness(1.2)}

/* CARDS */
.card{background:var(--card);border:2px solid rgba(255,255,255,.08);border-radius:24px;padding:24px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(108,63,197,.15) 0%,transparent 70%);pointer-events:none}

/* INTRO */
.section-title{font-family:'Bangers',cursive;font-size:1.4rem;color:var(--accent);letter-spacing:2px;text-align:center;margin-bottom:10px}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.mode-btn{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:14px;color:var(--text);padding:12px 6px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3}
.mode-btn .mode-icon{font-size:1.6rem;display:block;margin-bottom:4px}
.mode-btn.active{border-color:var(--accent);background:rgba(247,201,72,.12);color:var(--accent)}
.mode-btn:hover{border-color:var(--accent2)}
.len-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:20px}
.len-btn{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);padding:9px 4px;font-family:'Bangers',cursive;font-size:1.1rem;cursor:pointer;transition:all .2s}
.len-btn.active{border-color:var(--accent);background:rgba(247,201,72,.12);color:var(--accent)}
.btn-start{width:100%;padding:15px;background:linear-gradient(135deg,var(--purple),var(--purple2));border:none;border-radius:14px;color:#fff;font-family:'Bangers',cursive;font-size:1.8rem;letter-spacing:2px;cursor:pointer;box-shadow:0 6px 0 #2d1a6b,0 10px 30px rgba(108,63,197,.4);transition:all .15s}
.btn-start:hover{filter:brightness(1.15)}
.btn-start:active{transform:translateY(4px);box-shadow:0 2px 0 #2d1a6b}

/* GAME */
.round-badge{text-align:center;font-family:'Bangers',cursive;font-size:1.1rem;color:var(--subtext);letter-spacing:2px;margin-bottom:10px}
.img-stage{position:relative;display:flex;justify-content:center;align-items:center;height:220px;margin-bottom:8px}
.miscrit-img{max-height:200px;max-width:90%;object-fit:contain;transition:filter .5s ease,transform .4s ease;image-rendering:auto}
.miscrit-img.silhouette{filter:brightness(0) contrast(1) drop-shadow(0 0 12px rgba(108,63,197,.5))}
.miscrit-img.revealed{filter:drop-shadow(0 8px 20px rgba(0,0,0,.5));transform:scale(1.05);animation:pop .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes pop{0%{transform:scale(.8)}60%{transform:scale(1.1)}100%{transform:scale(1.05)}}
.easiest-label{position:absolute;top:6px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,#27ae60,#2ecc71);border-radius:999px;padding:3px 14px;font-size:.75rem;font-weight:800;letter-spacing:1px;color:#fff;white-space:nowrap}

.feedback-bar{min-height:38px;display:flex;justify-content:center;margin-bottom:12px}
.feedback{padding:7px 22px;border-radius:999px;font-weight:800;font-size:1rem;display:none}
.feedback.show{display:block}
.feedback.correct{background:rgba(39,174,96,.15);border:2px solid #27ae60;color:#2ecc71}
.feedback.wrong{background:rgba(192,57,43,.15);border:2px solid var(--red);color:#e74c3c}

/* OPTIONS */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.opt-btn{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:12px;color:var(--text);padding:13px 8px;font-weight:800;font-size:.9rem;cursor:pointer;transition:all .18s;text-align:center;line-height:1.2}
.opt-btn:hover:not(:disabled){border-color:var(--accent2);background:rgba(95,195,250,.1)}
.opt-btn.correct{background:rgba(39,174,96,.2)!important;border-color:#27ae60!important;color:#2ecc71}
.opt-btn.wrong{background:rgba(192,57,43,.2)!important;border-color:var(--red)!important;color:#e74c3c}
.opt-btn.reveal-correct{background:rgba(39,174,96,.15)!important;border-color:#27ae60!important}

/* INPUT */
.input-row{display:flex;gap:8px;margin-bottom:10px}
.guess-input{flex:1;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:12px;color:var(--text);padding:13px 16px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.95rem;outline:none;transition:border-color .2s}
.guess-input:focus{border-color:var(--accent)}
.guess-input:disabled{opacity:.5}
.hint-text{text-align:center;font-size:.9rem;color:var(--subtext);margin-bottom:10px;font-weight:700}

.btn-go{background:var(--accent);border:none;border-radius:12px;color:#000;font-family:'Bangers',cursive;font-size:1.5rem;padding:0 22px;cursor:pointer;box-shadow:0 4px 0 #b38f00;transition:all .15s}
.btn-go:active{transform:translateY(3px);box-shadow:0 1px 0 #b38f00}
.btn-go:disabled{opacity:.5;cursor:default}

.action-btns{display:flex;flex-direction:column;gap:8px}
.btn-skip{width:100%;padding:12px;background:rgba(95,195,250,.1);border:2px solid var(--accent2);border-radius:12px;color:var(--accent2);font-family:'Bangers',cursive;font-size:1.3rem;letter-spacing:1px;cursor:pointer;transition:all .2s}
.btn-skip:hover{background:rgba(95,195,250,.2)}
.btn-next{width:100%;padding:12px;background:linear-gradient(135deg,var(--purple),var(--purple2));border:none;border-radius:12px;color:#fff;font-family:'Bangers',cursive;font-size:1.3rem;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 0 #2d1a6b;transition:all .15s;display:none}
.btn-next:active{transform:translateY(3px);box-shadow:0 1px 0 #2d1a6b}
.hidden{display:none!important}

/* END */
.end-score{text-align:center;padding:20px 0}
.end-score .score-num{font-family:'Bangers',cursive;font-size:5rem;color:var(--accent);text-shadow:0 4px 20px rgba(247,201,72,.4);line-height:1}
.end-score .score-total{font-family:'Bangers',cursive;font-size:2.5rem;color:var(--subtext)}
.end-score .time-val{font-family:'Bangers',cursive;font-size:2rem;color:var(--accent2);margin-top:4px}
.share-row{display:flex;gap:8px;margin:14px 0}
.btn-share{flex:1;padding:11px 4px;border:none;border-radius:12px;font-weight:800;font-size:.85rem;cursor:pointer;color:#fff;transition:all .15s}
.btn-share:hover{filter:brightness(1.15)}
.btn-tw{background:#1da1f2;box-shadow:0 4px 0 #1275a8}
.btn-rd{background:#ff4500;box-shadow:0 4px 0 #b33200}
.btn-dc{background:#5865f2;box-shadow:0 4px 0 #3a45c0}
.btn-share:active{transform:translateY(3px);box-shadow:none}
.btn-again{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),#1e8449);border:none;border-radius:14px;color:#fff;font-family:'Bangers',cursive;font-size:1.8rem;letter-spacing:2px;cursor:pointer;box-shadow:0 5px 0 #145a32;transition:all .15s}
.btn-again:active{transform:translateY(4px);box-shadow:0 1px 0 #145a32}
.mode-badge{display:inline-block;padding:3px 12px;border-radius:999px;font-size:.8rem;font-weight:800;letter-spacing:1px;margin-bottom:6px}
.badge-easiest{background:rgba(39,174,96,.2);border:1px solid #27ae60;color:#2ecc71}
.badge-easy{background:rgba(95,195,250,.15);border:1px solid var(--accent2);color:var(--accent2)}
.badge-hard{background:rgba(192,57,43,.15);border:1px solid var(--red);color:#e74c3c}
</style>
</head>
<body>

<h1 class="logo">WHO'S THAT MISCRIT?!</h1>
<p class="tagline">The Ultimate Miscrits Guessing Game</p>

<!-- TOP BAR -->
<div id="topBar">
  <button id="btnHome">🏠 HOME</button>
  <div class="stat-pill">⏱ <span id="timerDisp">00:00</span></div>
  <div class="stat-pill">⭐ <span id="scoreDisp">0</span></div>
  <div class="stat-pill">📋 <span id="roundDisp">1</span>/<span id="totalDisp">25</span></div>
</div>

<!-- INTRO -->
<div class="card" id="introScreen">
  <div class="section-title">⚔️ DIFFICULTY</div>
  <div class="mode-grid">
    <button class="mode-btn" id="pickEasiest" onclick="setMode('easiest')">
      <span class="mode-icon">🌟</span>Easiest<br/><small style="color:var(--subtext);font-size:.75rem">Full image shown</small>
    </button>
    <button class="mode-btn active" id="pickEasy" onclick="setMode('easy')">
      <span class="mode-icon">🎯</span>Easy<br/><small style="color:var(--subtext);font-size:.75rem">Silhouette + choices</small>
    </button>
    <button class="mode-btn" id="pickHard" onclick="setMode('hard')">
      <span class="mode-icon">🔥</span>Hard<br/><small style="color:var(--subtext);font-size:.75rem">Silhouette + type it</small>
    </button>
  </div>
  <div class="section-title">🔢 HOW MANY?</div>
  <div class="len-grid">
    <button class="len-btn" data-len="5">5</button>
    <button class="len-btn" data-len="10">10</button>
    <button class="len-btn active" data-len="25">25</button>
    <button class="len-btn" data-len="50">50</button>
    <button class="len-btn" data-len="100">100</button>
  </div>
  <button class="btn-start" id="btnStart">✨ START GAME</button>
</div>

<!-- GAME -->
<div class="card hidden" id="gameScreen">
  <div class="round-badge">ROUND <span id="gRound">1</span> OF <span id="gTotal">25</span></div>
  <div class="img-stage">
    <span class="easiest-label hidden" id="easiestLabel">👁 FULL IMAGE — EASIEST MODE</span>
    <img class="miscrit-img" id="miscritImg" src="" alt="Miscrit"/>
  </div>
  <div class="feedback-bar"><div class="feedback" id="feedback"></div></div>
  <div id="easyUI">
    <div class="options-grid" id="optGrid">
      <button class="opt-btn"></button><button class="opt-btn"></button>
      <button class="opt-btn"></button><button class="opt-btn"></button>
    </div>
  </div>
  <div id="hardUI" class="hidden">
    <div class="hint-text" id="hintText"></div>
    <div class="input-row">
      <input type="text" class="guess-input" id="guessInput" placeholder="Type Miscrit name..." autocomplete="off"/>
      <button class="btn-go" id="btnSubmit">GO</button>
    </div>
  </div>
  <div class="action-btns">
    <button class="btn-skip" id="btnSkip">⏭ SKIP</button>
    <button class="btn-next" id="btnNext">NEXT →</button>
  </div>
</div>

<!-- END -->
<div class="card hidden" id="endScreen">
  <div style="text-align:center;margin-bottom:6px">
    <span class="mode-badge" id="modeBadge"></span>
  </div>
  <div class="end-score">
    <div style="font-family:'Bangers',cursive;font-size:1.2rem;color:var(--subtext);letter-spacing:2px">FINAL SCORE</div>
    <div><span class="score-num" id="finalScore">0</span><span class="score-total"> / <span id="finalTotal">0</span></span></div>
    <div class="time-val">⏱ <span id="finalTime">00:00</span></div>
  </div>
  <div class="share-row">
    <button class="btn-share btn-tw" id="btnTw">🐦 Twitter</button>
    <button class="btn-share btn-rd" id="btnRd">🤖 Reddit</button>
    <button class="btn-share btn-dc" id="btnDc">📋 Discord</button>
  </div>
  <button class="btn-again" id="btnAgain">🔄 PLAY AGAIN</button>
</div>

<script>
const SILHOUETTE_FOLDER = "miscrits_silhouettes";
const REAL_FOLDER = "images_scraped_from_miscripedia";
let gameMode = "easy", totalQ = 25, currentIdx = 0, score = 0;
let queue = [], answered = false, timerInt = null, secs = 0;

// Mode selection
function setMode(m) {
  gameMode = m;
  ["easiest","easy","hard"].forEach(x => {
    document.getElementById("pick"+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle("active", x===m);
  });
}

// Length selection
document.querySelectorAll(".len-btn").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".len-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    totalQ = parseInt(b.dataset.len);
  };
});

// Start
document.getElementById("btnStart").onclick = () => {
  queue = [...MISCRITS_DATA].sort(() => Math.random()-.5).slice(0, totalQ);
  currentIdx = 0; score = 0; secs = 0;
  document.getElementById("totalDisp").textContent = queue.length;
  document.getElementById("gTotal").textContent = queue.length;
  document.getElementById("scoreDisp").textContent = 0;
  document.getElementById("introScreen").classList.add("hidden");
  document.getElementById("topBar").classList.add("show");
  document.getElementById("gameScreen").classList.remove("hidden");
  startTimer(); loadRound();
};

// Timer
function startTimer() {
  clearInterval(timerInt);
  timerInt = setInterval(() => { secs++; updateTimerUI(); }, 1000);
}
function updateTimerUI() {
  const m = Math.floor(secs/60).toString().padStart(2,"0");
  const s = (secs%60).toString().padStart(2,"0");
  document.getElementById("timerDisp").textContent = `${m}:${s}`;
}

// Home
document.getElementById("btnHome").onclick = goHome;
document.getElementById("btnAgain").onclick = goHome;
function goHome() {
  clearInterval(timerInt);
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("endScreen").classList.add("hidden");
  document.getElementById("topBar").classList.remove("show");
  document.getElementById("introScreen").classList.remove("hidden");
}

// Load round
function loadRound() {
  answered = false;
  const name = queue[currentIdx];
  const img = document.getElementById("miscritImg");
  const label = document.getElementById("easiestLabel");

  document.getElementById("gRound").textContent = currentIdx+1;
  document.getElementById("roundDisp").textContent = currentIdx+1;
  document.getElementById("feedback").classList.remove("show","correct","wrong");
  document.getElementById("btnNext").style.display = "none";
  document.getElementById("btnSkip").style.display = "block";

  if (gameMode === "easiest") {
    // Show full colour image directly
    label.classList.remove("hidden");
    img.className = "miscrit-img";
    img.src = `${REAL_FOLDER}/${name}.png`;
    img.onerror = () => { img.src = `${SILHOUETTE_FOLDER}/${name}_silhouette.png`; };
    setupEasy(name);
    document.getElementById("hardUI").classList.add("hidden");
    document.getElementById("easyUI").classList.remove("hidden");
  } else {
    // Silhouette mode
    label.classList.add("hidden");
    img.className = "miscrit-img silhouette";
    img.src = `${SILHOUETTE_FOLDER}/${name}_silhouette.png`;
    img.onerror = () => { img.src = ""; };
    if (gameMode === "easy") {
      document.getElementById("hardUI").classList.add("hidden");
      document.getElementById("easyUI").classList.remove("hidden");
      setupEasy(name);
    } else {
      document.getElementById("easyUI").classList.add("hidden");
      document.getElementById("hardUI").classList.remove("hidden");
      setupHard(name);
    }
  }
}

function getHint(name) {
  if (name.startsWith("Dark ")) return "💀 Hint: It starts with \"Dark\"";
  if (name.startsWith("Light ")) return "✨ Hint: It starts with \"Light\"";
  if (name.startsWith("Foil ")) return "🌈 Hint: It starts with \"Foil\"";
  if (name.startsWith("Blighted ")) return "☠️ Hint: It starts with \"Blighted\"";
  const specials = ["Boo ","Vamp ","Scarecrow ","Pirate ","Rocker ","Grimm "];
  if (specials.some(p => name.startsWith(p))) return "🎭 Hint: It's a special event variant!";
  return `📝 Hint: ${name.length} letters`;
}

function setupEasy(correct) {
  const others = MISCRITS_DATA.filter(n=>n!==correct).sort(()=>Math.random()-.5).slice(0,3);
  const choices = [correct,...others].sort(()=>Math.random()-.5);
  const btns = document.querySelectorAll("#optGrid .opt-btn");
  btns.forEach((btn,i) => {
    btn.textContent = choices[i];
    btn.className = "opt-btn";
    btn.disabled = false;
    btn.onclick = () => checkAnswer(choices[i], btn, correct);
  });
}

function setupHard(name) {
  document.getElementById("hintText").textContent = getHint(name);
  const inp = document.getElementById("guessInput");
  inp.value = ""; inp.disabled = false; inp.focus();
  document.getElementById("btnSubmit").disabled = false;
  document.getElementById("btnSubmit").onclick = () => checkAnswer(inp.value.trim(), null, name);
}

function revealReal(name) {
  const img = document.getElementById("miscritImg");
  const t = new Image();
  t.onload = () => { img.src = t.src; img.className = "miscrit-img revealed"; };
  t.onerror = () => { img.className = "miscrit-img revealed"; };
  t.src = `${REAL_FOLDER}/${name}.png`;
}

function checkAnswer(guess, btn, correct) {
  if (answered) return;
  answered = true;
  const ok = guess.trim().toLowerCase() === correct.toLowerCase();
  if (ok) { score++; document.getElementById("scoreDisp").textContent = score; }

  // Reveal real image (for silhouette modes)
  if (gameMode !== "easiest") revealReal(correct);
  else { document.getElementById("miscritImg").className = "miscrit-img revealed"; }

  const fb = document.getElementById("feedback");
  fb.textContent = ok ? `✅ Correct! It's ${correct}!` : `❌ Wrong! It was ${correct}.`;
  fb.className = "feedback show " + (ok ? "correct" : "wrong");

  if (btn) {
    btn.classList.add(ok ? "correct" : "wrong");
    // highlight correct if wrong answer chosen
    if (!ok) {
      document.querySelectorAll("#optGrid .opt-btn").forEach(b => {
        if (b.textContent === correct) b.classList.add("reveal-correct");
      });
    }
  }
  document.querySelectorAll("#optGrid .opt-btn").forEach(b => b.disabled = true);
  if (gameMode === "hard") {
    document.getElementById("guessInput").disabled = true;
    document.getElementById("btnSubmit").disabled = true;
  }

  document.getElementById("btnSkip").style.display = "none";
  document.getElementById("btnNext").style.display = "block";
}

document.getElementById("btnSkip").onclick = () => {
  if (answered) return;
  queue.push(queue.splice(currentIdx,1)[0]);
  loadRound();
};
document.getElementById("btnNext").onclick = () => {
  currentIdx++;
  if (currentIdx < queue.length) loadRound(); else showEnd();
};
document.getElementById("guessInput").addEventListener("keypress", e => {
  if (e.key==="Enter") document.getElementById("btnSubmit").click();
});

function showEnd() {
  clearInterval(timerInt);
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("topBar").classList.remove("show");
  document.getElementById("finalScore").textContent = score;
  document.getElementById("finalTotal").textContent = queue.length;
  document.getElementById("finalTime").textContent = document.getElementById("timerDisp").textContent;
  const badge = document.getElementById("modeBadge");
  const labels = {easiest:"🌟 Easiest Mode",easy:"🎯 Easy Mode",hard:"🔥 Hard Mode"};
  const classes = {easiest:"badge-easiest",easy:"badge-easy",hard:"badge-hard"};
  badge.textContent = labels[gameMode]; badge.className = "mode-badge "+classes[gameMode];
  document.getElementById("endScreen").classList.remove("hidden");
}

const URL = "https://nyvora-vision-labs.github.io/Guess_the_Miscrit/";
document.getElementById("btnTw").onclick = () => {
  const t = encodeURIComponent(`I scored ${score}/${queue.length} on Who's That Miscrit?! Can you beat me? 🎮 ${URL}`);
  window.open(`https://twitter.com/intent/tweet?text=${t}`,"_blank");
};
document.getElementById("btnRd").onclick = () => {
  const t = encodeURIComponent(`I scored ${score}/${queue.length} on Who's That Miscrit?! Play here: ${URL}`);
  window.open(`https://www.reddit.com/submit?title=${t}`,"_blank");
};
document.getElementById("btnDc").onclick = e => {
  const btn = e.currentTarget, orig = btn.textContent;
  const text = `🎮 Who's That Miscrit?\nScore: ${score}/${queue.length} | Mode: ${gameMode} | Time: ${document.getElementById("timerDisp").textContent}\nPlay at: ${URL}`;
  navigator.clipboard.writeText(text).then(() => { btn.textContent = "✅ Copied!"; setTimeout(()=>btn.textContent=orig,2500); })
    .catch(()=>{ btn.textContent = "❌ Failed"; setTimeout(()=>btn.textContent=orig,2500); });
};
</script>
</body>
</html>
