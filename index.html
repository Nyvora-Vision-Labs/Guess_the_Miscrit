<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Who's That Miscrit?!</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      :root {
        --bg-dark: #161224;
        --poke-yellow: #ffcb05;
        --poke-blue: #2a75bb;
        --poke-dark-blue: #1d2c5e;
        --burst-blue: #5fc3fa;
        --red-outer: #cc2229;
        --red-dark: #8b1317;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg-dark);
        color: white;
        font-family: "Nunito", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 16px;
      }

      .title-text {
        font-family: "Bangers", cursive;
        font-size: 2.8rem;
        color: var(--poke-yellow);
        text-align: center;
        letter-spacing: 2px;
        text-shadow: -3px -3px 0 var(--poke-blue), 3px -3px 0 var(--poke-blue),
          -3px 3px 0 var(--poke-blue), 3px 3px 0 var(--poke-blue),
          0px 6px 0 var(--poke-dark-blue);
        line-height: 1.1;
        margin-bottom: 10px;
        position: relative;
        z-index: 2;
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 480px;
        margin-bottom: 15px;
      }

      .btn-home {
        background: #ed6c6c;
        color: white;
        border: 2px solid #a83232;
        border-radius: 8px;
        font-family: "Bangers", cursive;
        font-size: 1.2rem;
        padding: 4px 12px;
        cursor: pointer;
        box-shadow: 0 3px 0 #a83232;
        letter-spacing: 1px;
      }
      .btn-home:active {
        transform: translateY(3px);
        box-shadow: 0 0 0 #a83232;
      }

      .scoreboard {
        display: flex;
        gap: 15px;
        font-family: "Bangers", cursive;
        font-size: 1.3rem;
        color: var(--poke-yellow);
        letter-spacing: 1px;
        background: rgba(0, 0, 0, 0.4);
        padding: 5px 15px;
        border-radius: 12px;
      }

      .game-card {
        position: relative;
        background: var(--red-outer);
        border: 6px solid var(--red-dark);
        border-radius: 24px;
        padding: 20px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6),
          inset 0 0 20px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .burst-rays {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 150%;
        height: 150%;
        transform: translate(-50%, -50%);
        background: repeating-conic-gradient(
          from 0deg,
          #ffffff 0deg 3deg,
          var(--burst-blue) 3deg 6deg
        );
        mask-image: radial-gradient(
          circle,
          rgba(0, 0, 0, 1) 15%,
          rgba(0, 0, 0, 0) 65%
        );
        -webkit-mask-image: radial-gradient(
          circle,
          rgba(0, 0, 0, 1) 15%,
          rgba(0, 0, 0, 0) 65%
        );
        z-index: 0;
        pointer-events: none;
      }

      .question-mark {
        position: absolute;
        right: 20px;
        top: 80px;
        font-family: "Bangers", cursive;
        font-size: 6rem;
        color: var(--poke-yellow);
        text-shadow: -4px -4px 0 var(--poke-blue), 4px -4px 0 var(--poke-blue),
          -4px 4px 0 var(--poke-blue), 4px 4px 0 var(--poke-blue),
          6px 6px 0 var(--poke-dark-blue);
        transform: rotate(15deg);
        z-index: 2;
        animation: float 3s ease-in-out infinite;
        transition: opacity 0.3s ease;
      }
      .question-mark.hidden-q {
        opacity: 0;
        pointer-events: none;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(15deg);
        }
        50% {
          transform: translateY(-15px) rotate(10deg);
        }
      }

      .image-wrap {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 240px;
        margin-bottom: 10px;
        z-index: 2;
      }

      /* ── Silhouette / reveal states ── */
      .miscrit-img {
        max-height: 220px;
        max-width: 100%;
        /* silhouette: solid black */
        filter: brightness(0) drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.8));
        transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      /* silhouette removed, show real colours */
      .miscrit-img.revealed {
        filter: drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.5));
        transform: scale(1.05);
      }
      /* brief pop animation when revealed */
      @keyframes revealPop {
        0% {
          transform: scale(0.85);
        }
        60% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1.05);
        }
      }
      .miscrit-img.revealed {
        animation: revealPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .feedback-wrapper {
        display: flex;
        justify-content: center;
        position: relative;
        z-index: 2;
        min-height: 40px;
      }
      .feedback {
        background: white;
        border-radius: 999px;
        padding: 6px 20px;
        font-weight: 800;
        font-size: 1.1rem;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }
      .feedback.correct {
        color: #28a745;
        border: 2px solid #28a745;
      }
      .feedback.wrong {
        color: #dc3545;
        border: 2px solid #dc3545;
      }

      .ui-container {
        position: relative;
        z-index: 2;
        margin-top: 20px;
      }
      .input-row {
        display: flex;
        gap: 10px;
      }
      .guess-input {
        flex: 1;
        background: var(--bg-dark);
        border: 2px solid #000;
        border-radius: 12px;
        color: white;
        padding: 15px;
        outline: none;
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 1rem;
      }

      .btn-go {
        background: var(--poke-yellow);
        color: black;
        border: 2px solid #000;
        border-radius: 12px;
        font-family: "Bangers", cursive;
        font-size: 1.6rem;
        padding: 0 25px;
        cursor: pointer;
        box-shadow: 0 4px 0 #b38f00;
      }
      .btn-go:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #b38f00;
      }

      .btn-action {
        color: white;
        border: 2px solid #000;
        border-radius: 12px;
        font-family: "Bangers", cursive;
        font-size: 1.6rem;
        padding: 12px;
        width: 100%;
        cursor: pointer;
        margin-top: 15px;
        letter-spacing: 1px;
      }
      .btn-next {
        background: #ed6c6c;
        box-shadow: 0 4px 0 #a83232;
      }
      .btn-next:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #a83232;
      }
      .btn-skip {
        background: var(--burst-blue);
        color: var(--poke-dark-blue);
        box-shadow: 0 4px 0 var(--poke-dark-blue);
      }
      .btn-skip:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 var(--poke-dark-blue);
      }

      .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .length-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 5px;
        margin-bottom: 20px;
      }
      .option-btn {
        background: var(--bg-dark);
        border: 2px solid #000;
        border-radius: 12px;
        color: white;
        padding: 15px;
        font-weight: 700;
        cursor: pointer;
      }
      .length-grid .option-btn {
        padding: 10px 5px;
        font-family: "Bangers", cursive;
      }
      .option-btn.correct {
        background: #28a745 !important;
      }
      .option-btn.wrong {
        background: #dc3545 !important;
      }
      .hidden {
        display: none !important;
      }

      /* --- END SCREEN --- */
      #captureWrapper {
        position: relative;
        padding: 20px;
        border-radius: 16px;
        background: var(--red-outer);
        overflow: hidden;
        margin-bottom: 15px;
      }

      .inner-panel {
        background: rgba(0, 0, 0, 0.6);
        padding: 30px 20px;
        border-radius: 16px;
        text-align: center;
        position: relative;
        z-index: 2;
      }

      .watermark-link {
        margin-top: 15px;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.9);
        text-align: center;
        text-shadow: 1px 1px 2px #000;
        position: relative;
        z-index: 2;
        letter-spacing: 0.5px;
      }

      .social-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 15px;
        width: 100%;
        position: relative;
        z-index: 2;
      }
      .btn-social {
        flex: 1;
        padding: 12px 5px;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 0.95rem;
        border-radius: 12px;
        border: 2px solid #000;
        cursor: pointer;
        color: white;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .btn-social:active {
        transform: translateY(4px);
      }
      .btn-twitter {
        background: #33a1f2;
        box-shadow: 0 4px 0 #187abf;
      }
      .btn-twitter:active {
        box-shadow: 0 0 0 #187abf;
      }
      .btn-reddit {
        background: #ff4500;
        box-shadow: 0 4px 0 #cc3700;
      }
      .btn-reddit:active {
        box-shadow: 0 0 0 #cc3700;
      }
      .btn-discord {
        background: #5865f2;
        box-shadow: 0 4px 0 #4752c4;
      }
      .btn-discord:active {
        box-shadow: 0 0 0 #4752c4;
      }
    </style>
  </head>

    <div class="top-bar hidden" id="topStatsBar">
      <button class="btn-home" id="btnHome">HOME</button>
      <div class="scoreboard">
        <div>⏱️ <span id="timeDisplay">00:00</span></div>
        <div>⭐ <span id="scoreCorrect">0</span></div>
        <div>
          ROUND: <span id="roundNum">1</span>/<span id="totalRoundsDisplay"
            >50</span
          >
        </div>
      </div>
    </div>

    <!-- INTRO SCREEN -->
    <div class="game-card" id="introScreen">
      <div class="burst-rays"></div>
      <div class="title-text">WHO'S THAT<br />MISCRIT...?</div>

      <div
        class="ui-container"
        style="
          background: rgba(0, 0, 0, 0.5);
          padding: 20px;
          border-radius: 16px;
        "
      >
        <h2
          style="
            text-align: center;
            margin-bottom: 10px;
            font-family: 'Bangers', cursive;
            color: var(--poke-yellow);
            letter-spacing: 1px;
          "
        >
          Difficulty
        </h2>
        <div style="display: flex; gap: 10px; margin-bottom: 15px">
          <button
            class="option-btn"
            style="flex: 1; border-color: var(--poke-yellow)"
            id="pickEasy"
          >
            Easy (Choices)
          </button>
          <button class="option-btn" style="flex: 1" id="pickHard">
            Hard (Type)
          </button>
        </div>

        <h2
          style="
            text-align: center;
            margin-bottom: 10px;
            font-family: 'Bangers', cursive;
            color: var(--poke-yellow);
            letter-spacing: 1px;

        >
          Total Miscrits
        </h2>
        <div class="length-grid" id="lengthOptions">
          <button class="option-btn length-btn" data-len="5">5</button>
          <button class="option-btn length-btn" data-len="10">10</button>
          <button class="option-btn length-btn" data-len="25">25</button>
          <button class="option-btn length-btn" data-len="50">50</button>
          <button class="option-btn length-btn" data-len="100">100</button>
        </div>

        <button
          class="btn-action"
          id="btnStart"
          style="
            background: var(--poke-yellow);
            color: black;
            box-shadow: 0 4px 0 #b38f00;
          "
        >
          START GAME
        </button>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="game-card hidden">
      <div class="burst-rays"></div>
      <div class="title-text" style="font-size: 2.2rem">
        WHO'S THAT MISCRIT...?
      </div>
      <div class="question-mark" id="questionMark">?</div>

      <div class="feedback-wrapper">
        <div id="feedback" class="feedback hidden"></div>
      </div>

      <div class="image-wrap">
        <img class="miscrit-img" id="miscritImg" src="" alt="Silhouette" />
      </div>

      <div class="ui-container">
        <div id="easyUI" class="options-grid">
          <button class="option-btn"></button>
          <button class="option-btn"></button>
          <button class="option-btn"></button>
          <button class="option-btn"></button>
        </div>
        <div id="hardUI" class="input-row hidden">
          <input
            type="text"
            class="guess-input"
            id="guessInput"
            placeholder="Type name..."
            autocomplete="off"
          />
          <button class="btn-go" id="btnSubmit">GO</button>
        </div>
        <button class="btn-action btn-skip" id="btnSkip">SKIP ⏭️</button>
        <button class="btn-action btn-next hidden" id="btnNext">NEXT →</button>
      </div>
    </div>

    <!-- END SCREEN -->
    <div
      id="endScreen"
      class="game-card hidden"
      style="padding: 10px; background: none; border: none; box-shadow: none"
    >
      <div id="captureWrapper">
        <div class="burst-rays"></div>
        <div
          class="title-text"
          id="endTitle"
          style="font-size: 3.2rem; margin-bottom: 20px; z-index: 2"
        >
          FINISHED!
        </div>

        <div class="inner-panel">
          <h2
            style="
              font-family: 'Bangers', cursive;
              color: var(--poke-yellow);
              font-size: 2.2rem;
              margin-bottom: 0px;
              letter-spacing: 2px;
            "
          >
            FINAL SCORE
          </h2>
          <div
            style="
              font-family: 'Bangers', cursive;
              font-size: 4.5rem;
              color: #28a745;
              text-shadow: 3px 3px 0 #000;
              margin-bottom: 15px;
              line-height: 1;
            "
          >
            <span id="finalScoreDisplay">0</span
            ><span style="font-size: 2.5rem; color: #fff">
              / <span id="finalTotalDisplay">0</span></span
            >
          </div>
          <h2
            style="
              font-family: 'Bangers', cursive;
              color: var(--poke-yellow);
              font-size: 1.8rem;
              margin-bottom: 0px;
              letter-spacing: 2px;
            "
          >
            TIME
          </h2>
          <div
            id="finalTimeDisplay"
            style="
              font-family: 'Bangers', cursive;
              font-size: 3.2rem;
              color: var(--burst-blue);
              text-shadow: 3px 3px 0 #000;
              line-height: 1;
            "
          >
            00:00
          </div>
        </div>

        <div class="watermark-link">
          🎮 Play at: nyvora-vision-labs.github.io/Guess_the_Miscrit
        </div>
      </div>

      <div class="social-row">
        <button class="btn-social btn-twitter" id="btnShareTwitter">
          <span style="font-size: 1.2rem">🐦</span> X / Twitter
        </button>
        <button class="btn-social btn-reddit" id="btnShareReddit">

        </button>
        <button class="btn-social btn-discord" id="btnShareDiscord">
          <span style="font-size: 1.2rem">📋</span> Copy for Discord
        </button>
      </div>

      <button
        class="btn-action"
        id="btnPlayAgain"
        style="
          background: var(--poke-yellow);
          color: black;
          box-shadow: 0 4px 0 #b38f00;
          border-color: #000;
          font-size: 1.8rem;
          padding: 15px;
        "
      >
        PLAY AGAIN 🔄
      </button>
    </div>

      const SILHOUETTE_FOLDER = "miscrits_silhouettes";
      const REAL_IMAGE_FOLDER = "images_scraped_from_miscripedia";

      let gameMode = "easy";
      let totalMiscrits = 25;
      let currentIdx = 0;
      let score = 0;
      let queue = [];
      let answered = false;
      let timerInterval = null;
      let secondsElapsed = 0;

      // ── helpers ──────────────────────────────────────────────
      /** Strip "_silhouette" suffix to get the display name */
      function cleanName(entry) {
        return entry.replace("_silhouette", "");
      }

      /**
       * Attempt to swap the <img> to the real colour image.
       * Falls back to the silhouette (un-filtered) if the real image 404s.
       */
      function revealRealImage(entry) {
        const imgEl = document.getElementById("miscritImg");
        const name = cleanName(entry);

        // Preload to detect 404 before swapping src
        const tester = new Image();
        tester.onload = () => {
          imgEl.src = tester.src;
          imgEl.classList.add("revealed");
        };
        tester.onerror = () => {
          // No real image found — just remove the silhouette filter in place
          imgEl.classList.add("revealed");
        };
        tester.src = `${REAL_IMAGE_FOLDER}/${name}.png`;

        // Hide the floating "?"
        document.getElementById("questionMark").classList.add("hidden-q");
      }

      // ── navigation ───────────────────────────────────────────
      document.getElementById("btnHome").onclick = resetToHome;
      document.getElementById("btnPlayAgain").onclick = resetToHome;

      function resetToHome() {
        clearInterval(timerInterval);
        document.getElementById("gameScreen").classList.add("hidden");
        document.getElementById("topStatsBar").classList.add("hidden");
        document.getElementById("endScreen").classList.add("hidden");
        document.getElementById("introScreen").classList.remove("hidden");
      }

      document.getElementById("pickEasy").onclick = () => {
        gameMode = "easy";
        updateModeBtns();
      };
      document.getElementById("pickHard").onclick = () => {
        gameMode = "hard";
        updateModeBtns();
      };

      function updateModeBtns() {
        document.getElementById("pickEasy").style.borderColor =
          gameMode === "easy" ? "var(--poke-yellow)" : "#000";
        document.getElementById("pickHard").style.borderColor =
          gameMode === "hard" ? "var(--poke-yellow)" : "#000";
      }

      document.querySelectorAll(".length-btn").forEach((btn) => {
        btn.onclick = (e) => {
          totalMiscrits = parseInt(e.target.dataset.len);
          document.querySelectorAll(".length-btn").forEach((b) => {
            b.style.borderColor = "#000";
            b.style.background = "var(--bg-dark)";
          });
          e.target.style.borderColor = "var(--poke-yellow)";
          e.target.style.background = "var(--poke-dark-blue)";
        };
      });
      document.querySelector('.length-btn[data-len="25"]').click();

      document.getElementById("btnStart").onclick = () => {
        queue = [...MISCRITS_DATA]
          .sort(() => Math.random() - 0.5)
          .slice(0, totalMiscrits);
        currentIdx = 0;
        score = 0;
        secondsElapsed = 0;
        document.getElementById("totalRoundsDisplay").textContent =
          queue.length;
        document.getElementById("scoreCorrect").textContent = score;

        document.getElementById("introScreen").classList.add("hidden");
        document.getElementById("topStatsBar").classList.remove("hidden");
        document.getElementById("gameScreen").classList.remove("hidden");

        startTimer();
        loadRound();
      };

      // ── timer ─────────────────────────────────────────────────
      function startTimer() {
        clearInterval(timerInterval);
        updateTimerUI();
        timerInterval = setInterval(() => {
          secondsElapsed++;
          updateTimerUI();
        }, 1000);
      }
      function updateTimerUI() {
        const m = Math.floor(secondsElapsed / 60)
          .toString()
          .padStart(2, "0");
        const s = (secondsElapsed % 60).toString().padStart(2, "0");
        document.getElementById("timeDisplay").textContent = `${m}:${s}`;
      }

      // ── round loading ─────────────────────────────────────────
      function loadRound() {
        answered = false;
        const entry = queue[currentIdx];
        const imgEl = document.getElementById("miscritImg");

        // Reset to silhouette
        imgEl.src = `${SILHOUETTE_FOLDER}/${entry}.png`;
        imgEl.classList.remove("revealed");
        imgEl.onerror = () => {
          imgEl.src = "https://via.placeholder.com/200?text=Missing+Image";
        };

        // Restore "?" mark
        document.getElementById("questionMark").classList.remove("hidden-q");

        document.getElementById("roundNum").textContent = currentIdx + 1;
        document.getElementById("feedback").classList.add("hidden");
        document.getElementById("btnNext").classList.add("hidden");
        document.getElementById("btnSkip").classList.remove("hidden");

        if (gameMode === "easy") setupEasy(entry);
        else setupHard();
      }

      function setupEasy(correctEntry) {
        document.getElementById("easyUI").classList.remove("hidden");
        document.getElementById("hardUI").classList.add("hidden");

        const others = MISCRITS_DATA.filter((n) => n !== correctEntry)
          .sort(() => Math.random() - 0.5)
          .slice(0, 3);
        const choices = [correctEntry, ...others].sort(
          () => Math.random() - 0.5
        );

        const btns = document.querySelectorAll("#easyUI .option-btn");
        btns.forEach((btn, i) => {
          btn.textContent = cleanName(choices[i]);
          btn.className = "option-btn";
          btn.onclick = () => checkAnswer(cleanName(choices[i]), btn);
        });
      }

      function setupHard() {
        document.getElementById("hardUI").classList.remove("hidden");
        document.getElementById("easyUI").classList.add("hidden");
        const input = document.getElementById("guessInput");
        input.value = "";
        input.disabled = false;
        input.focus();
        document.getElementById("btnSubmit").onclick = () =>
          checkAnswer(input.value);
      }

      // ── answer checking ───────────────────────────────────────
      function checkAnswer(guess, btn = null) {
        if (answered) return;
        answered = true;

        const entry = queue[currentIdx];
        const name = cleanName(entry); // e.g. "Dark Aria"
        const isCorrect = guess.trim().toLowerCase() === name.toLowerCase();

        // ── REVEAL REAL IMAGE ──────────────────────────────────
        revealRealImage(entry);

        document.getElementById("btnNext").classList.remove("hidden");
        document.getElementById("btnSkip").classList.add("hidden");

        const feedback = document.getElementById("feedback");
        feedback.classList.remove("hidden");

        if (isCorrect) {
          score++;
          document.getElementById("scoreCorrect").textContent = score;
          feedback.textContent = `✅ Correct! It's ${name}!`;
          feedback.className = "feedback correct";
          if (btn) btn.classList.add("correct");
        } else {
          feedback.textContent = `❌ Wrong! It was ${name}.`;
          feedback.className = "feedback wrong";
          if (btn) btn.classList.add("wrong");
        }

        if (gameMode === "hard")
          document.getElementById("guessInput").disabled = true;
      }

      // ── skip / next ───────────────────────────────────────────
      document.getElementById("btnSkip").onclick = () => {
        if (answered) return;
        queue.push(queue.splice(currentIdx, 1)[0]);
        loadRound();
      };

      document.getElementById("btnNext").onclick = () => {
        currentIdx++;
        if (currentIdx < queue.length) loadRound();
        else showEndScreen();
      };

      document
        .getElementById("guessInput")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") document.getElementById("btnSubmit").click();
        });

      // ── end screen ────────────────────────────────────────────
      function showEndScreen() {
        clearInterval(timerInterval);
        document.getElementById("gameScreen").classList.add("hidden");
        document.getElementById("topStatsBar").classList.add("hidden");

        document.getElementById("finalScoreDisplay").textContent = score;
        document.getElementById("finalTotalDisplay").textContent = queue.length;
        document.getElementById("finalTimeDisplay").textContent =
          document.getElementById("timeDisplay").textContent;
        document.getElementById("endScreen").classList.remove("hidden");
      }

      // ── sharing ───────────────────────────────────────────────
      document.getElementById("btnShareTwitter").onclick = () => {
        const url = "https://nyvora-vision-labs.github.io/Guess_the_Miscrit/";
        const text = encodeURIComponent(
          `I scored ${score}/${queue.length} in Who's That Miscrit?! Can you beat me? Play here: ${url}`
        );
        window.open(`https://twitter.com/intent/tweet?text=${text}`, "_blank");
      };

      document.getElementById("btnShareReddit").onclick = () => {
        const url = "https://nyvora-vision-labs.github.io/Guess_the_Miscrit/";
        const text = encodeURIComponent(
          `I scored ${score}/${queue.length} in Who's That Miscrit?! Play here: ${url}`
        );
        window.open(`https://www.reddit.com/submit?title=${text}`, "_blank");
      };

      document.getElementById("btnShareDiscord").onclick = async (e) => {
        const btn = e.currentTarget;
        const originalHtml = btn.innerHTML;
        btn.innerHTML = "Generating...";
        try {
          const wrapper = document.getElementById("captureWrapper");
          const titleEl = document.getElementById("endTitle");
          const origText = titleEl.textContent;
          titleEl.textContent = "GUESS THE MISCRITS!";

          const canvas = await html2canvas(wrapper, {
            backgroundColor: null,
            scale: 2,
          });
          titleEl.textContent = origText;

          const blob = await new Promise((res) =>
            canvas.toBlob(res, "image/png")
          );
          await navigator.clipboard.write([
            new ClipboardItem({ "image/png": blob }),
          ]);
          btn.innerHTML = "✅ Copied to Clipboard!";
        } catch (err) {
          console.error(err);
          btn.innerHTML = "❌ Failed to copy";
          alert(
            "Your browser denied clipboard access or image generation failed."
          );
        }
        setTimeout(() => {
          btn.innerHTML = originalHtml;
        }, 3000);
      };
    </script>
